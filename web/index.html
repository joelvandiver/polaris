<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaris – Geometric Vector Graphics</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d0d1a;
        color: #e0e0f0;
        font-family: "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      header {
        background: #131326;
        border-bottom: 1px solid #2a2a4a;
        padding: 0.6rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.85rem;
      }

      .brand-mark {
        width: 2rem;
        height: 2rem;
        flex: 0 0 auto;
      }

      .brand-copy {
        display: flex;
        flex-direction: column;
        gap: 0.08rem;
      }

      header h1 {
        font-size: 1.08rem;
        line-height: 1.05;
        letter-spacing: 0.02em;
        color: #dfe8ff;
        font-weight: 650;
      }

      header .subtitle {
        font-size: 0.8rem;
        color: #7681a4;
      }

      #toolbar {
        background: #131326;
        border-bottom: 1px solid #2a2a4a;
        padding: 0.4rem 1rem;
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }

      #toolbar label {
        font-size: 0.8rem;
        color: #99a;
        margin-left: 0.8rem;
      }

      button {
        background: #1e1e3a;
        color: #c0c8ff;
        border: 1px solid #3a3a6a;
        border-radius: 4px;
        padding: 0.3rem 0.8rem;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.15s;
      }

      button:hover {
        background: #2a2a55;
      }

      button.active {
        background: #3a3aaa;
        border-color: #7a7aff;
        color: #fff;
      }

      #main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      #viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(#1a1a30 1px, transparent 1px),
          linear-gradient(90deg, #1a1a30 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: 0 0;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      #sidebar {
        width: 220px;
        background: #131326;
        border-left: 1px solid #2a2a4a;
        padding: 0.8rem;
        overflow-y: auto;
        font-size: 0.82rem;
      }

      #sidebar h2 {
        font-size: 0.9rem;
        color: #a0c4ff;
        margin-bottom: 0.6rem;
        border-bottom: 1px solid #2a2a4a;
        padding-bottom: 0.3rem;
      }

      .element-item {
        padding: 0.25rem 0.4rem;
        border-radius: 3px;
        color: #ccd;
        cursor: pointer;
      }

      .element-item:hover {
        background: #1e1e3a;
      }

      #status {
        font-size: 0.75rem;
        color: #667;
        padding: 0.3rem 1rem;
        background: #0a0a14;
        border-top: 1px solid #1a1a2a;
      }

      input[type="color"] {
        width: 2rem;
        height: 1.6rem;
        border: none;
        background: none;
        cursor: pointer;
        padding: 0;
        vertical-align: middle;
      }

      input[type="range"] {
        width: 70px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
          <defs>
            <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f8fbff" />
              <stop offset="55%" stop-color="#a0c4ff" />
              <stop offset="100%" stop-color="#5c7cff" />
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="20" fill="none" stroke="#24304f" stroke-width="1.5" />
          <circle cx="24" cy="24" r="11.5" fill="none" stroke="#24304f" stroke-width="1" />
          <path
            d="M24 6 L27.8 20.2 L42 24 L27.8 27.8 L24 42 L20.2 27.8 L6 24 L20.2 20.2 Z"
            fill="url(#brand-glow)"
          />
          <circle cx="24" cy="24" r="3.2" fill="#0d0d1a" stroke="#d9e7ff" stroke-width="1.2" />
        </svg>
        <div class="brand-copy">
          <h1>Polaris</h1>
          <span class="subtitle">Geometric Vector Graphics</span>
        </div>
      </div>
    </header>

    <div id="toolbar">
      <button id="btn-point" class="active" title="Place a point">Point</button>
      <button id="btn-segment" title="Draw a segment">Segment</button>
      <button id="btn-circle" title="Draw a circle">Circle</button>
      <button id="btn-line" title="Draw an infinite line">Line</button>
      <span style="flex:1"></span>
      <label>Stroke</label>
      <input type="color" id="stroke-color" value="#a0c4ff" />
      <label>Fill</label>
      <input type="color" id="fill-color" value="#3a3aaa" />
      <label>Width</label>
      <input type="range" id="stroke-width" min="0.5" max="8" step="0.5" value="1.5" />
      <button id="btn-export-svg" title="Open the current SVG in a new tab">Open SVG</button>
      <button id="btn-clear">Clear</button>
    </div>

    <div id="main">
      <div id="viewport">
        <svg id="scene" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="sidebar">
        <h2>Elements</h2>
        <div id="element-list"></div>
      </div>
    </div>

    <div id="status">Ready — click in the workspace to start drawing</div>

    <script type="module" src="main.js"></script>
  </body>
</html>
