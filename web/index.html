<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaris – Geometric Vector Graphics</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #060814;
        color: #e6ebf8;
        font-family: "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      header {
        background: #0c1020;
        border-bottom: 1px solid #1c2740;
        padding: 0.6rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.85rem;
      }

      .brand-mark {
        width: 2rem;
        height: 2rem;
        flex: 0 0 auto;
      }

      .brand-copy {
        display: flex;
        flex-direction: column;
        gap: 0.08rem;
      }

      header h1 {
        font-size: 1.08rem;
        line-height: 1.05;
        letter-spacing: 0.02em;
        color: #edf3ff;
        font-weight: 650;
      }

      header .subtitle {
        font-size: 0.8rem;
        color: #8a99bb;
      }

      #toolbar {
        background: #0c1020;
        border-bottom: 1px solid #1c2740;
        padding: 0.4rem 1rem;
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }

      #toolbar label {
        font-size: 0.8rem;
        color: #97a5c6;
        margin-left: 0.8rem;
      }

      button {
        background: #121936;
        color: #d5defa;
        border: 1px solid #2d3a63;
        border-radius: 4px;
        padding: 0.3rem 0.8rem;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.15s;
      }

      button:hover {
        background: #1a2449;
      }

      button.active {
        background: #1f356f;
        border-color: #7fb5ff;
        color: #f7fbff;
      }

      #main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      #tool-palette {
        width: 64px;
        background: #09101f;
        border-right: 1px solid #1c2740;
        padding: 0.7rem 0.45rem;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.45rem;
      }

      #tool-palette button {
        width: 100%;
        min-height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #tool-palette button svg {
        width: 1.05rem;
        height: 1.05rem;
      }

      #viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
        cursor: crosshair;
        background:
          linear-gradient(#11182d 1px, transparent 1px),
          linear-gradient(90deg, #11182d 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: 0 0;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      #sidebar {
        width: 220px;
        background: #0c1020;
        border-left: 1px solid #1c2740;
        padding: 0.8rem;
        overflow-y: auto;
        font-size: 0.82rem;
      }

      #sidebar h2 {
        font-size: 0.9rem;
        color: #b9d7ff;
        margin-bottom: 0.6rem;
        border-bottom: 1px solid #1c2740;
        padding-bottom: 0.3rem;
      }

      .element-item {
        padding: 0.25rem 0.4rem;
        border-radius: 3px;
        color: #cad3ed;
        cursor: pointer;
      }

      .element-item:hover {
        background: #121936;
      }

      #status {
        font-size: 0.75rem;
        color: #7f8eb2;
        padding: 0.3rem 1rem;
        background: #070b17;
        border-top: 1px solid #151d33;
      }

      input[type="color"] {
        width: 2rem;
        height: 1.6rem;
        border: none;
        background: none;
        cursor: pointer;
        padding: 0;
        vertical-align: middle;
      }

      input[type="range"] {
        width: 70px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
          <defs>
            <linearGradient id="brand-glow" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f8fbff" />
              <stop offset="55%" stop-color="#9fd6ff" />
              <stop offset="100%" stop-color="#7b87ff" />
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="20" fill="none" stroke="#24314f" stroke-width="1.5" />
          <circle cx="24" cy="24" r="11.5" fill="none" stroke="#24314f" stroke-width="1" />
          <path
            d="M24 6 L27.8 20.2 L42 24 L27.8 27.8 L24 42 L20.2 27.8 L6 24 L20.2 20.2 Z"
            fill="url(#brand-glow)"
          />
          <circle cx="24" cy="24" r="3.2" fill="#060814" stroke="#e4efff" stroke-width="1.2" />
        </svg>
        <div class="brand-copy">
          <h1>Polaris</h1>
          <span class="subtitle">Geometric Vector Graphics</span>
        </div>
      </div>
    </header>

    <div id="toolbar">
      <span style="flex:1"></span>
      <label>Stroke</label>
      <input type="color" id="stroke-color" value="#b8dcff" />
      <label>Fill</label>
      <input type="color" id="fill-color" value="#6b4fa3" />
      <label>Width</label>
      <input type="range" id="stroke-width" min="0.5" max="8" step="0.5" value="1.5" />
      <button id="btn-clear">Clear</button>
      <button id="btn-export-svg" title="Open the current SVG in a new tab">Open SVG</button>
    </div>

    <div id="main">
      <div id="tool-palette" aria-label="Drawing tools">
        <button id="btn-point" class="active" title="Place a point" aria-label="Place a point">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.5" fill="currentColor" />
          </svg>
        </button>
        <button id="btn-segment" title="Draw a segment" aria-label="Draw a segment">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="6" cy="18" r="2" fill="currentColor" />
            <circle cx="18" cy="6" r="2" fill="currentColor" />
            <path d="M7.4 16.6L16.6 7.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
        <button id="btn-circle" title="Draw a circle" aria-label="Draw a circle">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8" />
          </svg>
        </button>
        <button id="btn-line" title="Draw an infinite line" aria-label="Draw an infinite line">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div id="viewport">
        <svg id="scene" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="sidebar">
        <h2>Elements</h2>
        <div id="element-list"></div>
      </div>
    </div>

    <div id="status">Ready — click in the workspace to start drawing</div>

    <script type="module" src="main.js"></script>
  </body>
</html>
